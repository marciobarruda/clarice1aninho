<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite Clarice - Celebração Encantada</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Great+Vibes&family=Quicksand:wght@500;700&family=Lobster&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='appleGrad' x1='0%25' y1='0%25' x2='0%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%23ff4d4d' /%3E%3Cstop offset='100%25' style='stop-color:%23b30000' /%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M50 98 Q15 98 5 65 Q-5 25 30 5 Q50 -5 70 5 Q105 25 95 65 Q85 98 50 98' fill='url(%23appleGrad)' /%3E%3Cpath d='M42 12 Q50 -5 58 12' stroke='%235d4037' stroke-width='8' fill='none' stroke-linecap='round' /%3E%3Cpath d='M58 8 Q90 -10 85 30 Q65 35 58 8' fill='%234caf50' /%3E%3Cpath d='M30 25 Q15 35 15 55' fill='none' stroke='white' stroke-width='6' stroke-linecap='round' opacity='0.4' /%3E%3C/svg%3E">
</head>
<body>
    <div id="magic-overlay"></div>

    <main class="invitation-wrapper">
        <div class="invitation-container" id="invitation-stage">
            <!-- Unified SVG: Background + Text scale as a single unit -->
            <svg viewBox="0 0 1024 1024" class="master-svg" preserveAspectRatio="xMidYMid meet">
                <!-- Background Image Layer (Snow White, Dwarfs, Parchment) -->
                <image href="final_background.png" x="0" y="0" width="1024" height="1024" />
                
                <!-- Text Overlays (Coordinates calibrated for 1024x1024 canvas) -->
                <g class="text-layer" transform="translate(512, 0)">
                    <!-- Clarice -->
                    <text y="360" font-family="'Great Vibes', cursive" font-size="75" fill="#B01E17" text-anchor="middle" class="svg-shadow">Clarice</text>
                    <!-- 1 aninho -->
                    <text y="415" font-family="'Lobster', cursive" font-size="34" fill="#1A5276" text-anchor="middle">1 aninho</text>
                    
                    <!-- Invite Msg -->
                    <g transform="translate(0, 460)">
                        <text y="0" font-family="'Quicksand', sans-serif" font-size="17" font-weight="bold" fill="#4E342E" text-anchor="middle">É com muita alegria que convidamos</text>
                        <text y="24" font-family="'Quicksand', sans-serif" font-size="17" font-weight="bold" fill="#4E342E" text-anchor="middle">você para uma celebração</text>
                        <text y="48" font-family="'Quicksand', sans-serif" font-size="17" font-weight="bold" fill="#4E342E" text-anchor="middle">encantada!</text>
                    </g>

                    <!-- Details Grid -->
                    <g transform="translate(0, 565)">
                        <!-- Date -->
                        <g transform="translate(-75, 0)">
                            <text y="0" font-family="'Quicksand', sans-serif" font-size="15" font-weight="700" fill="#1A5276" text-anchor="middle">Domingo</text>
                            <text y="48" font-family="'Great Vibes', cursive" font-size="58" fill="#B01E17" text-anchor="middle">07</text>
                            <text y="75" font-family="'Quicksand', sans-serif" font-size="15" font-weight="700" fill="#1A5276" text-anchor="middle">Junho</text>
                        </g>
                        <!-- Separation Line -->
                        <line x1="0" y1="-10" x2="0" y2="75" stroke="#D4AF37" stroke-width="1.5" opacity="0.4" />
                        <!-- Time -->
                        <g transform="translate(75, 0)">
                            <text y="0" font-family="'Quicksand', sans-serif" font-size="15" font-weight="700" fill="#1A5276" text-anchor="middle">Às</text>
                            <text y="48" font-family="'Great Vibes', cursive" font-size="58" fill="#B01E17" text-anchor="middle">10</text>
                            <text y="75" font-family="'Quicksand', sans-serif" font-size="15" font-weight="700" fill="#1A5276" text-anchor="middle">Horas</text>
                        </g>
                    </g>

                    <!-- Location Area -->
                    <g transform="translate(0, 695)">
                        <text y="0" font-family="'Quicksand', sans-serif" font-size="24" font-weight="bold" fill="#1A5276" text-anchor="middle">PraBrinkar</text>
                        <text y="28" font-family="'Quicksand', sans-serif" font-size="16" fill="#1A5276" text-anchor="middle">Rua Honório Correia, 43 - Cordeiro</text>
                    </g>
                </g>
            </svg>
        </div>

        <!-- Feather RSVP Button -->
        <button id="rsvp-trigger" title="Confirmar Presença">
            <svg viewBox="0 0 100 100" class="feather-svg">
                <path d="M90 10 Q60 10 40 40 Q20 70 10 90 L15 95 Q30 85 60 65 Q90 45 90 10" fill="white" stroke="#D4AF37" stroke-width="2"/>
                <path d="M40 40 L35 45 M50 30 L45 35 M60 20 L55 25" stroke="#D4AF37" stroke-width="1"/>
            </svg>
            <span class="btn-text">Confirmar Presença</span>
        </button>
    </main>

    <!-- RSVP Modal Form -->
    <div id="rsvp-modal" class="hidden">
        <div class="modal-content">
            <button class="close-modal">&times;</button>
            <div id="form-inner">
                <h3>Confirmação de Presença</h3>
                <form id="rsvp-form">
                    <div class="form-group">
                        <label for="adult-name">Nome do Convidado (Adulto)</label>
                        <input type="text" id="adult-name" required placeholder="Seu nome completo">
                    </div>
                    <div id="children-container">
                        <div class="child-entry">
                            <div class="form-row">
                                <div class="form-group half">
                                    <label>Criança (Nome)</label>
                                    <input type="text" class="child-name" placeholder="Nome">
                                </div>
                                <div class="form-group quarter">
                                    <label>Idade</label>
                                    <input type="number" class="child-age" min="0" placeholder="0">
                                </div>
                                <button type="button" id="add-child-btn" class="add-btn" title="Adicionar Criança">+</button>
                            </div>
                        </div>
                        <div id="second-child" class="child-entry hidden">
                             <div class="form-row">
                                <div class="form-group half">
                                    <label>2ª Criança (Nome)</label>
                                    <input type="text" class="child-name-2" placeholder="Nome">
                                </div>
                                <div class="form-group quarter">
                                    <label>Idade</label>
                                    <input type="number" class="child-age-2" min="0" placeholder="0">
                                </div>
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="submit-btn">Enviar com Magia ✨</button>
                </form>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
